name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build jar
        working-directory: backend
        run: ./gradlew bootJar -x test --no-daemon

      - name: Copy jar and Dockerfile to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/build/libs/*.jar,backend/Dockerfile,docker-compose.yml"
          target: "/home/ubuntu/admin"
          strip_components: 0

      - name: Restart backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cp /home/ubuntu/admin/backend/build/libs/*.jar /home/ubuntu/admin/backend/app.jar
            cd /home/ubuntu/admin
            sudo docker-compose up -d --build backend
            sudo docker system prune -f
